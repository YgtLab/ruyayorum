name: Bug Report
about: Bir hatayı raporla
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Özet
      description: Sorunu kısa ve net anlat
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Yeniden üretim adımları
      description: Adım adım yaz
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Beklenen davranış
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Gerçek davranış
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Ortam
      description: OS, Node sürümü, tarayıcı
