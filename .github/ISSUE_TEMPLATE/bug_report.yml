name: Bug Report / Hata Bildirimi
about: Report a bug / Bir hatayı raporla
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary / Özet
      description: Briefly explain the issue / Sorunu kısa ve net anlat
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / Yeniden Üretim Adımları
      description: Write step by step / Adım adım yaz
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / Beklenen Davranış
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / Gerçek Davranış
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment / Ortam
      description: OS, Node version, browser / OS, Node sürümü, tarayıcı
