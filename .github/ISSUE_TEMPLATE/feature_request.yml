name: Feature Request / Özellik Önerisi
about: Suggest a feature / Yeni özellik öner
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement / Hangi problemi çözüyor
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution / Önerilen çözüm
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives / Alternatifler
